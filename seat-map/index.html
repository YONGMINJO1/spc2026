<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>자리배치도</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="label-back">뒤쪽 유리창</div>

  <div class="main-area">
    <div class="seat-area">
      <div class="classroom">

        <!-- 그룹A: 2열 × 4행 (왼쪽열 2명, 오른쪽열 4명) -->
        <div class="group group-a">
          <div class="seat" id="seat-a1" onclick="placeName(this)"></div>
          <div class="seat" id="seat-a2" onclick="placeName(this)"></div>
          <div class="seat" id="seat-a3" onclick="placeName(this)"></div>
          <div class="seat" id="seat-a4" onclick="placeName(this)"></div>
          <div class="seat seat-empty"></div>
          <div class="seat" id="seat-a5" onclick="placeName(this)"></div>
          <div class="seat seat-empty"></div>
          <div class="seat" id="seat-a6" onclick="placeName(this)"></div>
        </div>

        <!-- 그룹A↔B 사이 빈 공간 -->
        <div class="group-gap"></div>

        <!-- 그룹B: 3열 × 5행 (마지막 2칸 빈칸) -->
        <div class="group group-b">
          <div class="seat" id="seat-b1" onclick="placeName(this)"></div>
          <div class="seat" id="seat-b2" onclick="placeName(this)"></div>
          <div class="seat" id="seat-b3" onclick="placeName(this)"></div>
          <div class="seat" id="seat-b4" onclick="placeName(this)"></div>
          <div class="seat" id="seat-b5" onclick="placeName(this)"></div>
          <div class="seat" id="seat-b6" onclick="placeName(this)"></div>
          <div class="seat" id="seat-b7" onclick="placeName(this)"></div>
          <div class="seat" id="seat-b8" onclick="placeName(this)"></div>
          <div class="seat" id="seat-b9" onclick="placeName(this)"></div>
          <div class="seat" id="seat-b10" onclick="placeName(this)"></div>
          <div class="seat" id="seat-b11" onclick="placeName(this)"></div>
          <div class="seat" id="seat-b12" onclick="placeName(this)"></div>
          <div class="seat" id="seat-b13" onclick="placeName(this)"></div>
          <div class="seat" id="seat-b14" onclick="placeName(this)"></div>
          <div class="seat seat-empty"></div>
        </div>

        <!-- 그룹B↔D 사이 빈 공간 -->
        <div class="group-gap"></div>

        <!-- 그룹D: 2열 × 5행 -->
        <div class="group group-d">
          <div class="seat" id="seat-d1" onclick="placeName(this)"></div>
          <div class="seat" id="seat-d2" onclick="placeName(this)"></div>
          <div class="seat" id="seat-d3" onclick="placeName(this)"></div>
          <div class="seat" id="seat-d4" onclick="placeName(this)"></div>
          <div class="seat" id="seat-d5" onclick="placeName(this)"></div>
          <div class="seat" id="seat-d6" onclick="placeName(this)"></div>
          <div class="seat" id="seat-d7" onclick="placeName(this)"></div>
          <div class="seat" id="seat-d8" onclick="placeName(this)"></div>
          <div class="seat" id="seat-d9" onclick="placeName(this)"></div>
          <div class="seat" id="seat-d10" onclick="placeName(this)"></div>
        </div>

      </div>

      <div class="label-teacher">강사</div>
      <div class="label-screen">앞쪽 스크린</div>

      <div class="controls">
        <button id="btn-shuffle" onclick="shuffleSeats()">🔀 랜덤 배치</button>
        <button id="btn-reset" onclick="resetSeats()">🔄 초기화</button>
      </div>
    </div>

    <div class="name-panel">
      <div class="panel-title">📋 배치할 이름</div>
      <div id="name-list"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
