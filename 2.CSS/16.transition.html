<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        .square {
            width: 100px;
            height: 100px;
            background-color: red;

            transition-property: width, height;
            transition-duration: 1.5s;
        }
        .square:hover {
            width: 200px;
            height: 200px;
        }
        .button {
            color: black;
            transition-property: color;
            transition-duration: 1.5s;
        }
        .image {
            width: 300px;
            height: 200px;
            transition-property: transform;
            transition-duration: 1.0s;
        }
        .image:hover {
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
    <div class="square"></div>
    <hr>
    <button class="button">마우스를 올려보시오</button>
    <hr>
    <img class="image" src="images/고양이1.jpg">
</body>
</html>
