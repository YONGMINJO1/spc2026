<html>
    <head>
        <meta charset="utf-8">
        <title>Document</title>
        <style>
            div {
                width: 100px;
                height: 100px;
                color: white;
                background: orange;
                margin: 5px;
            }
            .location {
                background-color: orangered;
                position: relative; /* relative 상대적 , absolute 절태적 */
                top: 50px;
                left: 50px;
            }
            .img {
                width: 300px;
                height: 200px;
                background-image: url(images/고양이1.jpg);
                background-size: 100% 100%;
            }
            .image-text {
                position: relative;
                top: 50px;
                left: 50px;
            }
        </style>
    </head>
    <body>
        <div>1</div>
        <div class="location">2</div>
        <div>3</div>
        <div class="img">
            <p class="image-text">고양이</p>
        </div>
    </body>
</html>
