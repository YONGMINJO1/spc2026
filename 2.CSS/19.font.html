<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>

            font-family: "TImes New Roman", TImes, serif;
        }

    <p class="p4">This is a paragraph with "여기서부터 한글로..."나눔 고딕"폰트입니다."</p>
    <p class="p5">This is a paragraph with "여기서부터 한글로..."굴림"폰트입니다."</p>
