<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <title>Document</title>
        <style>
            table {
                border-collapse: collapse;
            }
            td {
                padding: 10px;
                border: 1px solid black;
            }
        </style>
    </head>
    <body>
        <table>
            <tr>
                <td>셀 1</td>
                <td>셀 2</td>
                <td>셀 3</td>
            </tr>
            <tr>
                <td>셀 4</td>
                <td>셀 5</td>
                <td>셀 6</td>
            </tr>
            <tr>
                <td>셀 7</td>
                <td>셀 8</td>
                <td>셀 9</td>
            </tr>
        </table>

        <hr />

        <table>
            <tr>
                <td>셀 1</td>
                <td>셀 2</td>
            </tr>
            <tr>
                <td>셀 3</td>
                <td>셀 4</td>
            </tr>
        </table>
        <button onclick="changeOddCells()">홀수셀 색상 변경</button>
        <button onclick="changeEvenCells()">짝수셀 색상 변경</button>

        <script>
            function changeOddCells() {
                const cells = document.getElementsByTagName('td');
                //console.log(cells[0]);
                for (let i = 0; i < cells.length; i++) {
                    if (i % 2 == 0) {
                        //console.log(cells[i]);
                        cells[i].style.backgroundColor = 'lightgreen';
                    }
                }
            }
            function changeEvenCells() {
                const cells = document.getElementsByTagName('td');
                Array.from(cells).forEach((cell, index) => {
                    //console.log(cell);
                    if (index % 2 == 1) {
                        cell.style.backgroundColor = 'lightblue';
                    }
                });
            }
        </script>
    </body>
</html>
