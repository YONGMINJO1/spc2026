<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Document</title>
    </head>
    <body>
        <h1>숫자 맞추기 게임</h1>
        <h2>1 ~ 100까지 숫자를 맞춰보세요</h2>
        <input
            type="number"
            id="guessNumber"
            placeholder="숫자를 입력하세요."
        />
        <button id="guessButton" onclick="">Guess</button>
        <div id="result"><!-- 결과를 출력할 곳 --></div>
        <div>
            <ol id="history">
                <!-- 입력값 히스토리가 출력될 곳 -->
            </ol>
        </div>

        <script>
            const randomNumber = Math.floor(Math.random() * 10) + 1;
            console.log('생성한 숫자: ', randomNumber);

            const result = document.getElementById('result');
            const history = document.getElementById('guessButton');

            function guessNumber() {
                const guess = document.getElementById('guessNumber').value;

                // 로직 구현 - 찍은 숫자가 크면,'숫자가 큽니다. 더 작은 숫자를 입력하세요.'
                // 로직 구현 - 찍은 숫자가 적으면, '숫자가 작습니다. 더 큰 숫자를 입력하세요'
                // 로직 구현 - 정답이 맞으면, '축하합니다. 정답입니다.
                // '
                if (randomNumber < guess) {
                    result.textContent =
                        '숫자가 큽니다. 더 작은 숫자를 입력하세요';
                } else if (randomNumber > guess) {
                    result.textContent = '숫자가 작아요';
                } else {
                    result.textContent = '축하합니다.정답을 맞췄습니다.';
                    guessButton.disabled = true;
                }

                const li = document.createElement('li');
                li.textContent = `입력값은 ${guess}: $(result.textContent)`;
                history.appendChild(li);
            }
        </script>
    </body>
</html>
