<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <title>카운트 다운</title>
        <style></style>
    </head>
    <body>
        <h1>카운트 다운</h1>
        <input
            type="number"
            id="timeInput"
            placeholder="초를 입력하세요."
            min="1"
        />
        <button onclick="startTimer()">시작</button>
        <div id="timerContainer">
            <!--카운트 다운을 출력할 곳-->
        </div>

        <script>
            let timerId;
            function startTimer() {
                let inputValue = parseInt(
                    document.getElementById('timeInput').value,
                );
                const timerContainer =
                    document.getElementById('timerContainer');
                const timerDisplay = document.getElementById('timerDisplay');

                const timerP = document.createElement('p');
                timerP.textContent = `${inputValue}초가 남았습니다.`;

                timerContainer.appendChild(timerP);

                const timerId = setInterval(() => {
                    if (inputValue <= 0) {
                        clearInterval(timerId);
                        timerDisplay.textContent = '시간이 종료되었습니다.';
                    } else {
                        inputValue--;
                        timerDisplay.textContent = `${inputValue}초가 남았습니다.`;
                    }
                }, 1000);
            }
        </script>
    </body>
</html>
