<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>프로그레스바</title>
        <link rel="stylesheet" href="css/progress.css" />
    </head>
    <body>
        <h1>프로그레스바</h1>
        <input
            type="number"
            id="timeInput"
            placeholder="초를 입력하세요."
            min="1"
        />
        <button id="startButton">시작</button>
        <button id="clearButton">초기화</button>
        <div id="progressBar">
            <div id="progress"><span id="progressText">0%</span></div>
        </div>

        <script src="JS/progress.js"></script>
    </body>
</html>
