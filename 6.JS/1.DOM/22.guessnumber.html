<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Document</title>
    </head>
    <body>
        <h1>숫자 맞추기 게임</h1>
        <input
            type="number"
            id="guessNumber"
            placeholder="숫자를 입력하세요."
        />
        <button id="guessButton" onclick="">Guess</button>
        <div id="result"><!-- 결과를 출력할 곳 --></div>
        <script>
            const randomNumber = Math.floor(Math.random() * 10) + 1;
            console.log('생성한 숫자: ', randomNumber);

            const result = document.getElementById('result');
            function guessNumber() {
                const guess = document.getElementById('guessNumber').value;
                // 로직 구현 - 찍은 숫자가 크면, "숫자가 큽니다. 더 작은 숫자를 입력해주세요."
                // 로직 구현 - 찍은 숫자가 작으면, "숫자가 작아요. 더 큰 숫자를 입력해주세요."
                // 로직 구현 - 정답이 맞으면, "축하합니다. 정답을 맞췄습니다."
                if (randomNumber < guess) {
                    result.textContent =
                        "숫자가 큽니다. 더 작은 숫자를 입력하세요";
                } else if (randomNumber > guess) {
                    result.textContent =
                        "숫자가 작아요. 더 큰 숫자를 입력하세요";
                } else {
                    result.textContent = '축하합니다. 정답을 맞췄습니다.';ㄴ
                }
            }
        </script>
    </body>
</html>
