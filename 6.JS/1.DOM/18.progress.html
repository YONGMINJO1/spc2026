<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>프로그레스바</title>
        <style>
            #progressBar {
                width: 100%;
                background-color: yellow;
            }
            #progress {
                width: 0%;
                height: 30px;
                background-color: orange;
            }
            #progressText {
                position: absolute;
                width: 100%;
                text-align: center;
                color: black;
            }
        </style>
    </head>
    <body>
        <h1>프로그레스바</h1>
        <input
            type="number"
            id="timeInput"
            placeholder="초를 입력하세요."
            min="1"
        />
        <button onclick="startProgress()" id="startButton">시작</button>
        <button onclick="clearProgress()">초기화</button>
        <div id="progressBar">
            <div id="progress"><span id="progressText">0%</span></div>
        </div>
        <script>
            let interval;
            let timerId;
            const timeInput = document.getElementById('timeInput');
            const progress = document.getElementById('progress'); // 진행률 바

            const progressText = document.getElementById('progressText');
            const startButton = document.getElementById('startButton');

            function startProgress() {
                duration = parseInt(timeInput.value);
                console.log('입력초: ', duration);

                let elapsed = 0; /* 초과시간 */
                timerId = setInterval(() => {
                    elapsed++;

                    const ratio = Math.floor((elapsed / duration) * 100);
                    progress.style.width = `${ratio}%`;
                    progressText.textContent = `${ratio}%`;
                    //console.log('반복호출');

                    if (ratio >= 100) {
                        // 타이머 중지
                        clearInterval(timerId);
                    }
                }, 1000);
                z;
            }

            function clearProgress() {
                if (timerId) clearInterval(timerId);
                progress.style.width = '2px';
                timeInput.value = '';
                progressText.textContent = `0%`;
                startButton.disabled = false;
            }
        </script>
    </body>
</html>
