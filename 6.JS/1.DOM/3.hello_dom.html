<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
</head>
<body>
    <h1>나의 헤딩</h1>
    <p>여기는 나의 문장이 있는 곳</p>
    <div id="output"><!-- 여기는 동적으로 컨텐츠를 채울 곳 --></div>
    <p>여기는 나의 두번재 문장이 있는 곳</p>
    <button onclick="sayhello()">여기는 나의 버튼</button>
    <script>
        function sayhello() {
            console.log("sayhello");
            const myoutput = document.getElementById('output')
            console.log(myoutput)
            myoutput.textContent = "나의 새로운 동적 문장"
        }
    </script>
</body>
</html>
