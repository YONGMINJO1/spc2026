<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
</head>
<body>
    <h1>heyhello</h1>
    <script>
        function heyhello() {
            console.log("hey!!");
            document.write("<h1>HELLO !!!</h1>");
            document.write("<p>");
            document.write("HELLO AGAIN!!!");
            document.write("</p>");
        }
        for (let i=1; i <= 5; i++){
            document.write("숫자: "+ i + "<br>");
        }
        heyhello();
    </script>
</body>
</html>
