<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <title>구구단</title>
    </head>
    <body>
        <h1>구구단 출력기</h1>
        <input type="text" placeholder="단을 입력하시오 (예: 2)" id="input" />
        <button onclick="printGugudan()">출력하기</button>

        <div id="result">
            <!-- 결과가 출력하기-->
        </div>

        <script>
            function printGugudan() {
                // ==============
                // 입력값 가져오기
                // ==============
                // console.log("버튼 잘 눌림")
                const userInput = document.getElementById('input'); // 이건 DOM이 반환됨
                const userInputValue = userInput.value; // 해당 DOM 요소가 가지고 있는 값 반환
                // const userValue = document.getElementById('input').value;
                console.log(userInputValue);
                // console.log(userValue);

                const userInputValueNumber = parseInt(userInputValue);

                // =============
                // 입력값 검증하기
                // =============

                if (isNaN(userInputValue)) {
                    // 사용자에게 올바르게 입력하라고 알려줌.
                    const result = document.getElementById('result');
                    result.innerHTML = '<h3> 숫자만 허용합니다.';
                    return;
                }

                // if(userInputValueNumber < 1 || userInputValueNumber >= 9 ) {
                //     // 사용자에게 올바르게 입력하라고 알려줌.
                //     const result = document.getElementById('result');
                //     result.innerHTML = "<h3> 입력 숫자는 1 ~ 9 까지만 가능합니다.";
                //     return;
                // }

                // =============
                // 출력값 만들기
                // =============
                const result = document.getElementById('result');
                console.log(result);
                // textContent는 말 그대로 글자 본문을 입력할 때 사용
                // innerHTML은 HTML값을 파싱할 수 있도록 출력..
                result.innerHTML = '<h3>' + userInputValue + '단</h3>';

                for (let i = 1; i <= 9; i++) {
                    // result.innerHTML = userInputValue + ' x ' + ' i ' + ' = ' + userInputValue * i + '<br> '
                    result.innerHTML += `${userInputValue} X ${i} = ${userInputValue * i}<br>`;
                }
            }
        </script>
    </body>
</html>
