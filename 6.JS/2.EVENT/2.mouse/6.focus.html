<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Document</title>
    </head>
    <body>
        <input type="text" id="myInput" placeholder="여기 글자를 입력하세요" />
        <hr />
        <input
            type="password"
            id="myInput2"
            placeholder="여기 비밀번호 를 입력하세요"
        />

        <script>
            document.getElementById('myInput').addEventListener('focus', () => {
                console.log('입력창 활성화 됨');
            });

            document.getElementById('myInput').addEventListener('blur', () => {
                console.log('입력창 비활성화 됨');
            });
            document
                .getElementById('myInput2')
                .addEventListener('focus', () => {
                    console.log('PW 입력창이 활성화 됨');
                });
            document.getElementById('myInput2').addEventListener('blur', () => {
                console.log('PW 입력창이 활성화 됨');
            });
        </script>
    </body>
</html>
