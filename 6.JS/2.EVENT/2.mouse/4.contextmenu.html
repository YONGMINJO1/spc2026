<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Document</title>
        <style>
            #mybutton {
                width: 100px;
                height: 100px;
                background-color: lightblue;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <div id="mybutton">클릭하세요</div>
        <script>
            document
                .getElementById('mybutton')
                .addEventListener('contextmenu', (ev) => {
                    ev.preventDefault();
                    console.log('우클릭 성공함');
                });

            // 위에는 특정 요소만 막기
            // 아래는 페이지 모든 것 막기

            document.addEventListener('contextmeun', (ev) => {
                ev.preventDefault();
                alert('우리 사이트는 우클릭이 막혀 있습니다.');
            });
        </script>
    </body>
</html>
