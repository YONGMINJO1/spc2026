<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Document</title>
        <style>
            #dragItem {
                width: 100px;
                height: 100px;
                background-color: #ffcc00;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                z-index: 1;
            }

            .dropContainer {
                width: 200px;
                height: 200px;
                background-color: #f0f0f0;
                border: 2px dashed #cccccc;
                display: flex;
                align-items: center;
                justify-content: center;
                position: relative;
                margin-bottom: 20px;
            }

            .placeholder {
                position: absolute;
                color: #999;
            }
        </style>
    </head>
    <body>
        <div id="startZone" class="dropContainer">
            <span class="placeholder" id="startplaceholder">Drag Here</span>
            <div id="dragItem" draggable="true">Drag me</div>
        </div>

        <div id="dropZone" class="dropContainer">
            <span class="placeholder" id="dropPlaceholder">Drop Here</span>
        </div>

        <script>
            const dragItem = document.getElementById('dragItem');
            const dropZone = document.getElementById('dropZone');
            const startZone = document.getElementById('startZone');

            dragItem.addEventListener('dragstart', () => {
                console.log('drag Started');
            });

            [startZone, dropZone].forEach((zone) => {
                zone.addEventListener('dragover', (ev) => {
                    ev.preventDefault();
                    console.log('위에 있음');
                });
            });

            [startZone, dropZone].forEach((zone) => {
                zone.addEventListener('drop', (ev) => {
                    ev.preventDefault();
                    console.log('위에 있음');
                    zone.append(dragItem);
                });
            });
            // dragZone.addEventListener('dragZone', () => {
            //     console.log('drag Zone');
            // });
            // startZone.addEventListener('startZone', () => {
            //     console.log('Start Zone');
            // });
        </script>
    </body>
</html>
