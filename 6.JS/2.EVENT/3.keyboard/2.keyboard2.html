<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <title>Keyboard Event Example</title>
        <style>
            #displayKey {
                font-size: 100px;
                text-align: center;
                margin-top: 50px;
                color: #333;
            }
        </style>
    </head>
    <body>
        <input type="text" id="myInput" placeholder="키를 입력하세요" />
        <div id="displayKey"><!-- 눌린키를 표시할곳 --></div>
        <script>
            const displayKeyElement = document.getElementById('displayKey');
            document
                .getElementById('myInput')
                .addEventListener('keydown', (ev) => {
                    displayKeyElement.textContent = ev.key;
                });
        </script>
    </body>
</html>
