<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Document</title>
        <style>
            .gallery img {
                width: 100px;
                height: 100px;
                margin: 5px;
                cursor: pointer;
            }
            #large-img {
                display: none;
                margin: 20px auto;
                max-width: 100%;
            }
        </style>
    </head>
    <body>
        <h1>Image Gallery</h1>
        <div class="gallery">
            <img id="img1" src="images/cat1.jpg" width="100px" />
            <img id="img2" src="images/cat2.jpg" width="100px" />
            <img id="img3" src="images/cat3.jpg" width="100px" />
        </div>

        <img id="large-image" src="" />

        <script>
            const img1 = document.getElementById('img1');
            const img2 = document.getElementById('img2');
            const img3 = document.getElementById('img3');

            img1.addEventListener('click', () => {
                const largeImage = document.getElementById('large-image');
                largeImage.src = img1.src;
                largeImage.style.display = 'block';
            });
            img2.addEventListener('click', () => {
                const largeImage = document.getElementById('large-image');
                largeImage.src = img2.src;
                largeImage.style.display = 'block';
            });
            img3.addEventListener('click', () => {
                const largeImage = document.getElementById('large-image');
                largeImage.src = img3.src;
                largeImage.style.display = 'block';
            });
        </script>
    </body>
</html>
