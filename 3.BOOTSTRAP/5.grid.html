<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <h2 class="text-center my-4">부트스트랩 그리드 예제</h2>
        <div class="row">
            <div class="col">1번 열</div>
            <div class="col">2번 열</div>
            <div class="col">3번 열</div>
            <div class="col">4번 열</div>
            <div class="col">5번 열</div>
            <div class="col">6번 열</div>
            <div class="col">7번 열</div>
            <div class="col">8번 열</div>
            <div class="col">9번 열</div>
            <div class="col">10번 열</div>
            <div class="col">11번 열</div>
            <div class="col">12번 열</div>
        </div>
    </div>

    <div class="container">
        <div class="row">
            <div class="col-md-4">4칸짜리 열</div>
            <div class="col-md-8">8칸짜리 열</div>
        </div>
    </div>

    <div class="container">
        <div class="row">
            <div class="col-4" style="background-color: lightblue;">4칸짜리 열</div>
            <div class="col-6" style="background-color: lightgreen;">6칸짜리 열</div>
            <div class="col-8" style="background-color: lightcoral;">8칸짜리 열</div>
        </div>
    </div>

    <div class="container">
        <h4 class="text-center my-4">반응형 컨테이너 예제</h4>
        <div class="row">
            <div class="col-sm-6 col-md-4 col-lg-2 bg-primary text-white p-3">box1</div>
            <div class="col sm-6 col-md-4 col-lg-2 bg-secondary text-white p-3">box2</div>
            <div class="col sm-6 col-md-4 col-lg-2 bg-danger text-white p-3">box3</div>
            <div class="col sm-6 col-md-4 col-lg-2 bg-warning text-white p-3">box4</div>
            <div class="col sm-6 col-md-4 col-lg-2 bg-info text-white p-3">box4</div>
            <div class="col sm-6 col-md-4 col-lg-2 bg-success text-white p-3">box4</div>
        </div>
    </div>

    <div class="container">
        <h4 class="text-center my-4">더 디테일한 반응형 컨테이너 예제</h4>
        <div class="d-block d-sm-none bg-danger text-white p-3 text-center">아주 작은 화면- ~575px</div>
        <div class="d-none d-sm-block bg-dark text-white p-3 text-center">작은 화면 - 576px ~ 767px</div>
        <div class="d-none d-md-block bg-info text-white p-3 text-center">중간 화면 - 768px ~ 991px</div>
        <div class="d-none d-lg-block bg-secondary text-white p-3 text-center">큰 화면에서 - 992px ~ 1199px</div>
        <div class="d-none d-xl-block bg-primary text-white p-3 text-center">아주 큰 화면 - 1200px ~ 1399px</div>
    </div>
</body>
</html>
