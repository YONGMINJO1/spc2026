<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Document</title>
</head>
<body>
    <h2>간단한 Alert 테스트</h2>

    <button onclick="inputPrompt()">버튼</button>

    <script>
        function showAlert() {
            //console.log("버튼클릭됨");
            // alert('이건 경고입니다.');
            Swal.fire({
                title: '안녕하세요',
                text: '이건 SweetAlert 입니다.',
                icon: 'question',
                confireButtonTest: '확인'
            }) 
        }

        function basicAlert(){
            Swal.fire('안녕하세요', '이건 경고입니다.')
        }

        function confireAlert() {
            Swal.fire({
                title:'정말 삭제하시겠습니까?',
                text:'이 작업을 되돌릴 수 없습니다.',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText:'삭제',
                cancelButtonText:'취소'
            }).then((result) => {
                if(result.isConfirmed) {
                    Swal.fire('삭제완료','항목이 삭제되었습니다.','succedd');
                } else {
                    Swal.fire('취소됨', '데이터는 그대로 유지합니다.', 'info');
                }
            })
        }

        function inputPrompt() {
            Swal.fire({
                title: '이름을 입력하세요',
                input: 'text',
                inputPlaceholder: '여기에 입력...',
                showCancelButton: true,
                confirmButtonText:'제출',
                cancelButtonText:'취소'
            }).then((result)=>{
                if (result.isConfirmed && result.value) {
                    Swal.fire('입력한 값: $(result.value)');
                }
            })
        }
    </script>
</body>
</html>
